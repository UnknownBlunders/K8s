gatus:
  delayStartSeconds: "5"
  env:
    TZ: America/Chicago
sidecar:
  kinds:
    httproute:
      enable: true
      auto: true
    service:
      enable: true
httpRoute:
  enabled: true
  annotations:
    gatus.home-operations.com/enabled: "false"
  hostnames:
    - "status.blunders.me"
  parentRefs:
    - name: envoy-internal
      namespace: network
monitoring:
  serviceMonitor:
    enabled: true
persistence:
  enabled: true
  storageClass: ceph-block
  accessMode: ReadWriteOnce
  size: 2Gi
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 512Mi
config:
  existingConfigMap: "gatus-config"
  items:
    - key: config.yaml
      path: config.yaml
