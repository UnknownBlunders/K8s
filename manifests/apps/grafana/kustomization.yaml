apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana

helmCharts:
- name: grafana-operator
  releaseName: grafana
  namespace: grafana
  repo: oci://ghcr.io/grafana/helm-charts
  version: "5.22.2"
  valuesInline:
    dashboard:
      enabled: true
    serviceMonitor:
      enabled: true

resources:
- ns.yaml
- admin-user-es.yaml
- grafana.yaml
- grafanadashboard.yaml
