# https://grafana.com/grafana/dashboards/19308-prometheus-nut-exporter-for-druggeri/
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: ups-nut
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  url: https://raw.githubusercontent.com/DRuggeri/nut_exporter/1e886dd2e0c31edb27896e3b2d2f95853ca5e66b/dashboard/dashboard.json
