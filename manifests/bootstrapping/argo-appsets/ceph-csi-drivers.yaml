apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-csi-drivers
  namespace: argocd
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: rook-ceph
  source:
    repoURL: "https://github.com/unknownblunders/K8s.git"
    path: manifests/bootstrapping/ceph-csi-drivers
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
