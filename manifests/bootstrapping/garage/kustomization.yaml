apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: garage

helmCharts:
- name: app-template
  releaseName: garage
  namespace: garage
  repo: https://bjw-s-labs.github.io/helm-charts
  version: 5.0.1
  valuesFile: values.yaml

- name: app-template
  releaseName: garage-webui
  namespace: garage
  repo: https://bjw-s-labs.github.io/helm-charts
  version: 5.0.1
  valuesFile: webui-values.yaml

resources:
- ns.yaml
- externalsecret.yaml
- volume.yaml
- garage-httproute.yaml
- webui-httproute.yaml
- backendtrafficpolicy.yaml
