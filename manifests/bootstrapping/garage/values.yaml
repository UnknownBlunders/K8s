configMaps:
  config:
    data:
      configuration.toml: |
        metadata_dir = "/meta"
        data_dir = "/data"
        db_engine = "lmdb"
        metadata_auto_snapshot_interval = "6h"

        replication_factor = 1
        compression_level = 2

        rpc_bind_addr = "[::]:3901"
        rpc_public_addr = "127.0.0.1:3901"

        [s3_api]
        s3_region = "us-east-1"
        api_bind_addr = "[::]:3900"
        root_domain = ".s3.blunders.me"

        [admin]
        api_bind_addr = "[::]:3903"
persistence:
  config:
    enabled: true
    type: configMap
    name: garage
    globalMounts:
      - path: /etc/garage.toml
        subPath: configuration.toml
  data:
    existingClaim: garage-pvc
    advancedMounts:
      garage:
        garage-container:
          - path: /data
            subPath: data
          - path: /meta
            subPath: meta
