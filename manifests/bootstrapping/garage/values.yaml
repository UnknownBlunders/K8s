controllers:
  garage:
    containers:
      garage-container:
        image:
          repository: dxflrs/garage
          tag: v2.3.0
        env:
          TZ: America/Chicago
        envFrom:
          - secretRef:
              name: garage-secret
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: [ALL]}
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 1Gi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1021
    runAsGroup: 1021
    seccompProfile: {type: RuntimeDefault}
service:
  garage-container:
    ports:
      s3:
        port: &port 3900
      api:
        port: 3903
