controllers:
  garage-webui:
    containers:
      app:
        image:
          repository: khairul169/garage-webui
          tag: 1.1.0@sha256:17c793551873155065bf9a022dabcde874de808a1f26e648d4b82e168806439c
        env:
          TZ: America/Chicago
          API_BASE_URL: http://garage.garage.svc.cluster.local.:3903
          S3_ENDPOINT_URL: http://garage.garage.svc.cluster.local.:3900
          API_ADMIN_KEY:
            valueFrom:
              secretKeyRef:
                name: garage-secret
                key: GARAGE_ADMIN_TOKEN
        envFrom:
          - secretRef:
              name: garage-secret
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: [ALL] }
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 128Mi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
service:
  app:
    ports:
      http:
        port: &port 3909

