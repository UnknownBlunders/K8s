apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rook-ceph-dashboard-password
  namespace: rook-ceph
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-prod
  target:
    name: rook-ceph-dashboard-password
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        api-token: '{{ .password }}'
  data:
  - secretKey: password
    remoteRef:
      key: rook-ceph-dashboard-password
      property: password
