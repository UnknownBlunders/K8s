apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
helmCharts:
  - name: snapshot-controller
    releaseName: snapshot-controller
    namespace: kube-system
    repo: oci://ghcr.io/piraeusdatastore/helm-charts
    version: 5.1.1
    valuesInline:
      controller:
        serviceMonitor:
          create: true
      webhook:
        enabled: false
