name: render kustomization and comment diff on PR

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout head repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.COMMIT_PAT }}
          ref: ${{ github.head_ref }}
          path: head

      - name: Checkout base repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.COMMIT_PAT }}
          ref: ${{ github.base_ref }}
          path: base

      - name: render kustomizations, break into parts (if needed), and comment
        env: 
          GH_TOKEN: ${{ secrets.COMMIT_PAT }}
        run: |
          echo "<details>" >> header.txt
          echo "<summary> Kustomization build Diff </summary>" >> header.txt
          echo " " >> header.txt
          echo "\`\`\`diff" >> header.txt
          echo "\`\`\`" >> footer.txt
          echo "</details>" >> footer.txt

          cd head
          for KUSTOMIZATION_PATH in $( gh pr view ${{ github.event.number }} --json files -q '.files[].path' | cut -d/ -f 1-3 ) # get first three directories of changed files
          do
            HEAD_KUSTOMIZATION=${KUSTOMIZATION_PATH}
            RENDERED_HEAD=../rendered/head/${KUSTOMIZATION_PATH}

            BASE_KUSTOMIZATION=../base/${KUSTOMIZATION_PATH}
            RENDERED_BASE=../rendered/base/${KUSTOMIZATION_PATH}

            echo "rendering ${HEAD_KUSTOMIZATION}"
            mkdir -p ${RENDERED_HEAD}
            kustomize build --enable-exec --enable-alpha-plugins "${HEAD_KUSTOMIZATION}" >> ${RENDERED_HEAD}/manifest.yaml

            echo "rendering ${BASE_KUSTOMIZATION}"
            mkdir -p ${RENDERED_BASE}
            kustomize build --enable-exec --enable-alpha-plugins "${BASE_KUSTOMIZATION}" >> ${RENDERED_BASE}/manifest.yaml

            git diff --no-index ${RENDERED_BASE}/manifest.yaml ${RENDERED_HEAD}/manifest.yaml >> ../body.txt || true
          done

          cd ..

          if (( $(cat body.txt | wc -m) > 65200 )); then
            echo "This file is too big to comment on GitHub! Splitting..."
            split -b 65200 --filter='{cat header.txt; cat; echo " "; cat footer.txt} > $FILE' body.txt out_
          else
            echo "We only need one file. Assembling..."
            cat header.txt >> out_aa
            cat body.txt >> out_aa
            cat footer.txt >> out_aa
          fi

          INDEX=1
          for FILE in out_*;
          do
            echo "Here are the rendered changes made in this PR (Part: $INDEX):" | cat - $FILE | gh pr comment ${{ github.event.number }} -F -
            ((INDEX=INDEX+1))
          done
